<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NadiCare 2026 – Certificate Ceremony</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --crimson: #C0392B;
    --deep-red: #8B1A1A;
    --gold: #D4A853;
    --cream: #FAF6EF;
    --dark: #1A1208;
    --mid: #3D2B1F;
    --pulse: #E8543A;
  }

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--dark);
    color: var(--cream);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  /* Grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      repeating-linear-gradient(0deg, transparent, transparent 59px, rgba(192,57,43,0.05) 60px),
      repeating-linear-gradient(90deg, transparent, transparent 59px, rgba(192,57,43,0.04) 60px);
    pointer-events: none;
  }

  /* ECG line */
  .ecg {
    position: fixed;
    bottom: 60px;
    left: 0;
    width: 100%;
    opacity: 0.12;
    pointer-events: none;
  }

  .wrap {
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    padding: 2rem;
    gap: 0;
  }

  .org-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.68rem;
    letter-spacing: 0.35em;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 1.2rem;
    opacity: 0.8;
  }

  .event-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2.8rem, 8vw, 6rem);
    font-weight: 900;
    line-height: 1.0;
    margin-bottom: 0.4rem;
  }
  .event-title span { color: var(--crimson); }

  .tagline {
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    letter-spacing: 0.25em;
    color: rgba(250,246,239,0.4);
    text-transform: uppercase;
    margin-bottom: 3.5rem;
  }

  /* Participant count */
  .count-row {
    display: flex;
    gap: 3rem;
    margin-bottom: 4rem;
    align-items: center;
  }
  .count-item { text-align: center; }
  .count-num {
    font-family: 'Playfair Display', serif;
    font-size: 3rem;
    font-weight: 700;
    color: var(--gold);
    display: block;
    line-height: 1;
  }
  .count-lbl {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    color: rgba(250,246,239,0.35);
    text-transform: uppercase;
    margin-top: 0.3rem;
  }
  .count-divider {
    width: 1px;
    height: 50px;
    background: rgba(212,168,83,0.2);
  }

  /* THE BUTTON */
  .send-btn {
    position: relative;
    padding: 1.6rem 4rem;
    background: var(--crimson);
    color: #fff;
    border: none;
    border-radius: 8px;
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.3rem, 3vw, 1.8rem);
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.02em;
    transition: all 0.3s;
    box-shadow: 0 0 40px rgba(192,57,43,0.3);
    margin-bottom: 2rem;
  }
  .send-btn::before {
    content: '';
    position: absolute;
    inset: -3px;
    border-radius: 10px;
    background: linear-gradient(135deg, var(--crimson), var(--gold));
    z-index: -1;
    opacity: 0;
    transition: opacity 0.3s;
  }
  .send-btn:hover:not(:disabled)::before { opacity: 1; }
  .send-btn:hover:not(:disabled) {
    transform: translateY(-4px) scale(1.02);
    box-shadow: 0 20px 60px rgba(192,57,43,0.5);
  }
  .send-btn:active:not(:disabled) { transform: scale(0.98); }
  .send-btn:disabled {
    opacity: 0.6;
    cursor: not-allowed;
    transform: none;
  }

  /* Status */
  .status-text {
    font-family: 'DM Mono', monospace;
    font-size: 0.8rem;
    letter-spacing: 0.1em;
    color: rgba(250,246,239,0.4);
    height: 1.2rem;
    transition: all 0.3s;
  }
  .status-text.active { color: var(--gold); }
  .status-text.done { color: #81C784; }
  .status-text.error { color: var(--pulse); }

  /* Progress bar */
  .progress-wrap {
    width: min(500px, 90vw);
    margin-top: 1.5rem;
    opacity: 0;
    transition: opacity 0.4s;
  }
  .progress-wrap.visible { opacity: 1; }
  .progress-bg {
    background: rgba(255,255,255,0.06);
    border-radius: 20px;
    height: 6px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--crimson), var(--gold));
    border-radius: 20px;
    width: 0%;
    transition: width 0.5s ease;
  }
  .progress-label {
    display: flex;
    justify-content: space-between;
    margin-top: 0.5rem;
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    color: rgba(250,246,239,0.3);
  }

  /* Success overlay */
  .success-overlay {
    position: fixed;
    inset: 0;
    background: rgba(26,18,8,0.96);
    z-index: 50;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 1rem;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.6s;
  }
  .success-overlay.visible {
    opacity: 1;
    pointer-events: all;
  }
  .success-icon { font-size: 5rem; animation: bounce 0.6s ease; }
  .success-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2rem, 6vw, 4rem);
    font-weight: 900;
    color: #81C784;
  }
  .success-sub {
    font-family: 'DM Mono', monospace;
    font-size: 0.85rem;
    color: rgba(250,246,239,0.45);
    letter-spacing: 0.1em;
  }
  .success-count {
    font-family: 'Playfair Display', serif;
    font-size: 2rem;
    color: var(--gold);
    margin-top: 0.5rem;
  }

  @keyframes bounce {
    0% { transform: scale(0); }
    60% { transform: scale(1.2); }
    100% { transform: scale(1); }
  }

  /* Confetti canvas */
  #confetti { position: fixed; inset: 0; pointer-events: none; z-index: 100; }

</style>
</head>
<body>

<canvas id="confetti"></canvas>

<div class="wrap">
  <p class="org-label">IEEE SPS · BNMIT · 14 March 2026</p>
  <h1 class="event-title">Nadi<span>Care</span></h1>
  <p class="tagline">Certificate Ceremony</p>

  <div class="count-row">
    <div class="count-item">
      <span class="count-num">47</span>
      <span class="count-lbl">Teams</span>
    </div>
    <div class="count-divider"></div>
    <div class="count-item">
      <span class="count-num" id="totalEmails">148</span>
      <span class="count-lbl">Participants</span>
    </div>
    <div class="count-divider"></div>
    <div class="count-item">
      <span class="count-num" id="sentNum">0</span>
      <span class="count-lbl">Sent</span>
    </div>
  </div>

  <button class="send-btn" id="sendBtn" onclick="sendCertificates()">
    🎓 Send Certificates
  </button>

  <p class="status-text" id="statusText">Ready to dispatch</p>

  <div class="progress-wrap" id="progressWrap">
    <div class="progress-bg">
      <div class="progress-fill" id="progressFill"></div>
    </div>
    <div class="progress-label">
      <span id="progressLeft">Sending...</span>
      <span id="progressRight">0%</span>
    </div>
  </div>
</div>

<!-- ECG decoration -->
<svg class="ecg" viewBox="0 0 1440 60" preserveAspectRatio="none">
  <polyline points="0,30 200,30 220,30 230,5 240,55 250,30 260,30 460,30 480,30 490,10 500,50 510,30 520,30 720,30 740,30 750,8 760,52 770,30 780,30 980,30 1000,30 1010,12 1020,48 1030,30 1040,30 1240,30 1260,30 1270,6 1280,54 1290,30 1300,30 1440,30"
    fill="none" stroke="#C0392B" stroke-width="2"/>
</svg>

<!-- Success overlay -->
<div class="success-overlay" id="successOverlay">
  <div class="success-icon">🎉</div>
  <h2 class="success-title">Certificates Sent!</h2>
  <p class="success-sub">All participants have been notified</p>
  <p class="success-count" id="successCount">148 emails delivered</p>
</div>

<script>
  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  // CONFIG — fill these in before the ceremony
  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
  const SCRIPT_URL  = 'https://script.google.com/macros/s/AKfycbzEfIHSQR3hmSo0Lek3VQMwvtFRWNPpTBuFfkBScVsIgP5vdiQmGlCgV2ORSMt6-c4N/exec';
  const DRIVE_LINK  = 'https://drive.google.com/drive/folders/11VPugMTa1sNcRUQC6pNwNDHa90g5iqd5?usp=drive_link';
  const EMAIL_SUBJ  = 'NadiCare 2026 – Your Participation Certificate 🎓';
  const EMAIL_BODY  =
`Dear {NAME},

Thank you for participating in the NadiCare Hackathon. It was a pleasure having you as part of the event, and we truly appreciate the effort, creativity, and enthusiasm you brought.

Please find your participation certificate here:
{DRIVE_LINK}

We hope this experience was enriching and inspiring, and we look forward to seeing you in our future events!

NadiCare Team, BNMIT
IEEE SPS-BNMIT`;
  // ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

  async function sendCertificates() {
    const btn = document.getElementById('sendBtn');
    const status = document.getElementById('statusText');
    const progressWrap = document.getElementById('progressWrap');
    const progressFill = document.getElementById('progressFill');
    const progressLeft = document.getElementById('progressLeft');
    const progressRight = document.getElementById('progressRight');
    const sentNum = document.getElementById('sentNum');

    btn.disabled = true;
    btn.textContent = '⏳ Sending...';
    status.className = 'status-text active';
    status.textContent = 'Connecting to server...';
    progressWrap.classList.add('visible');
    progressFill.style.width = '15%';
    progressLeft.textContent = 'Connecting...';
    progressRight.textContent = '15%';

    try {
      progressFill.style.width = '40%';
      progressRight.textContent = '40%';
      status.textContent = 'Dispatching emails...';
      progressLeft.textContent = 'Sending...';

      const res = await fetch(SCRIPT_URL + '?t=' + Date.now(), {
        method: 'POST',
        body: JSON.stringify({
          driveLink: DRIVE_LINK,
          subject: EMAIL_SUBJ,
          body: EMAIL_BODY
        })
      });

      const data = await res.json();

      progressFill.style.width = '100%';
      progressRight.textContent = '100%';
      progressLeft.textContent = 'Complete!';

      sentNum.textContent = data.sent || 0;
      status.className = 'status-text done';
      status.textContent = `✓ ${data.sent} certificates sent!`;
      btn.textContent = '✅ Done!';

      document.getElementById('successCount').textContent =
        `${data.sent} emails delivered successfully`;

      setTimeout(() => {
        document.getElementById('successOverlay').classList.add('visible');
        launchConfetti();
      }, 600);

    } catch(err) {
      status.className = 'status-text error';
      status.textContent = 'Error: ' + err.message;
      btn.disabled = false;
      btn.textContent = '🎓 Send Certificates';
      progressFill.style.width = '0%';
    }
  }

  // ── Confetti ──
  function launchConfetti() {
    const canvas = document.getElementById('confetti');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    const colors = ['#C0392B','#D4A853','#FAF6EF','#E8543A','#8B1A1A','#fff'];
    const pieces = Array.from({length: 160}, () => ({
      x: Math.random() * canvas.width,
      y: Math.random() * -canvas.height,
      w: Math.random() * 10 + 4,
      h: Math.random() * 6 + 3,
      color: colors[Math.floor(Math.random() * colors.length)],
      rot: Math.random() * 360,
      speed: Math.random() * 4 + 2,
      drift: Math.random() * 2 - 1,
      spin: Math.random() * 4 - 2
    }));

    let frame;
    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      pieces.forEach(p => {
        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(p.rot * Math.PI / 180);
        ctx.fillStyle = p.color;
        ctx.fillRect(-p.w/2, -p.h/2, p.w, p.h);
        ctx.restore();
        p.y += p.speed;
        p.x += p.drift;
        p.rot += p.spin;
        if (p.y > canvas.height) { p.y = -10; p.x = Math.random() * canvas.width; }
      });
      frame = requestAnimationFrame(draw);
      setTimeout(() => cancelAnimationFrame(frame), 6000);
    }
    draw();
  }
</script>
</body>
</html>
